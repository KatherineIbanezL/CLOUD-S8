name: Build and Deploy Microservices

on:
  push:
    branches:
      - main

jobs:
  build-producer:
    name: Build Producer Service
    runs-on: ubuntu-latest

    env:
      PRODUCER_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/producer-service
      IMAGE_TAG: ${{ github.sha }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Test producer-service
        run: |
          cd producer-service
          mvn -B clean test

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push producer image
        uses: docker/build-push-action@v6
        with:
          context: ./producer-service
          push: true
          tags: |
            ${{ env.PRODUCER_IMAGE }}:latest
            ${{ env.PRODUCER_IMAGE }}:${{ env.IMAGE_TAG }}

  build-consumer:
    name: Build Consumer Service
    runs-on: ubuntu-latest

    env:
      CONSUMER_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/consumer-service
      IMAGE_TAG: ${{ github.sha }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Test consumer-service
        run: |
          cd consumer-service
          mvn -B clean test

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push consumer image
        uses: docker/build-push-action@v6
        with:
          context: ./consumer-service
          push: true
          tags: |
            ${{ env.CONSUMER_IMAGE }}:latest
            ${{ env.CONSUMER_IMAGE }}:${{ env.IMAGE_TAG }}

  deploy-microservices:
    name: Deploy Microservices on EC2
    runs-on: ubuntu-latest
    needs:
      - build-producer
      - build-consumer

    env:
      IMAGE_TAG: ${{ github.sha }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare microservices directories on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            mkdir -p /home/${{ secrets.EC2_USER }}/producer-service
            mkdir -p /home/${{ secrets.EC2_USER }}/consumer-service
            mkdir -p /home/${{ secrets.EC2_USER }}/rabbitmq

      - name: Copy microservices compose file to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "deploy/compose.microservices.yml"
          target: "/home/${{ secrets.EC2_USER }}/producer-service"
          strip_components: 1

      - name: Deploy producer and consumer
        uses: appleboy/ssh-action@v1.0.3
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
          RABBITMQ_USERNAME: ${{ secrets.RABBITMQ_USERNAME }}
          RABBITMQ_PASSWORD: ${{ secrets.RABBITMQ_PASSWORD }}
          # Tus nombres de variables mapeadas con Azure
          ISSUER_URI: ${{ secrets.ISSUER_URI }}
          JWK_SET_URI: ${{ secrets.JWK_SET_URI }}
          AUDIENCE: ${{ secrets.AUDIENCE }}
          # Tus variables obligatorias de AWS para subir guías a S3
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
          AWS_S3_BUCKET_NAME: ${{ secrets.AWS_S3_BUCKET_NAME }}
          CONSUMER_SIMULATE_ERROR_FOR_PRODUCT: ${{ secrets.CONSUMER_SIMULATE_ERROR_FOR_PRODUCT }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: DOCKERHUB_USERNAME,DOCKERHUB_TOKEN,IMAGE_TAG,RABBITMQ_USERNAME,RABBITMQ_PASSWORD,ISSUER_URI,JWK_SET_URI,AUDIENCE,AWS_ACCESS_KEY_ID,AWS_SECRET_ACCESS_KEY,AWS_SESSION_TOKEN,AWS_S3_BUCKET_NAME,CONSUMER_SIMULATE_ERROR_FOR_PRODUCT
          script: |
            set -e

            cd /home/${{ secrets.EC2_USER }}/producer-service

            # Red de comunicación externa propia del proyecto
            docker network create guia-network || true

            cat > .env <<EOF
            DOCKERHUB_USERNAME=${DOCKERHUB_USERNAME}
            IMAGE_TAG=${IMAGE_TAG}
            RABBITMQ_USERNAME=${RABBITMQ_USERNAME}
            RABBITMQ_PASSWORD=${RABBITMQ_PASSWORD}
            ISSUER_URI=${ISSUER_URI}
            JWK_SET_URI=${JWK_SET_URI}
            AUDIENCE=${AUDIENCE}
            AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
            AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
            AWS_SESSION_TOKEN=${AWS_SESSION_TOKEN}
            AWS_S3_BUCKET_NAME=${AWS_S3_BUCKET_NAME}
            CONSUMER_SIMULATE_ERROR_FOR_PRODUCT=${CONSUMER_SIMULATE_ERROR_FOR_PRODUCT}
            EOF

            echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin

            docker compose -f compose.microservices.yml --env-file .env pull
            docker compose -f compose.microservices.yml --env-file .env up -d

            # Limpieza y verificación de contenedores activos
            docker image prune -f
            docker ps --filter name=producer-service
            docker ps --filter name=consumer-service